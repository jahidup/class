<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – CoursePro</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .hidden { display: none; }
    .admin-section { margin-bottom: 30px; background: var(--surface); padding: 24px; border-radius: var(--radius); box-shadow: var(--shadow); }
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; margin: 12px 0; }
    .form-row input, .form-row select { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 0.95rem; }
    .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #f8f9ff; margin: 8px 0; border-radius: 8px; }
    .btn-danger { background: #e74c3c; }
    .btn-danger:hover { background: #c0392b; }
  </style>
</head>
<body>
  <div class="container">
    <div id="loginSection">
      <h2>🔐 Admin Access</h2>
      <input type="password" id="adminPassword" placeholder="Enter admin password" style="padding:12px; width:100%; border-radius:8px; border:2px solid #ddd;">
      <button class="btn" style="margin-top:12px;" onclick="login()">Login</button>
      <p id="loginMsg" style="color:red; margin-top:8px;"></p>
    </div>

    <div id="dashboard" class="hidden">
      <h1>⚙️ Admin Dashboard</h1>
      <button class="btn btn-danger" onclick="logout()" style="float:right;">Logout</button>
      <div style="clear:both; margin-bottom:20px;"></div>

      <!-- Courses -->
      <div class="admin-section">
        <h2>📚 Courses</h2>
        <div id="courseList"></div>
        <div class="form-row">
          <input type="text" id="courseTitle" placeholder="Course title">
          <input type="text" id="courseThumb" placeholder="Thumbnail URL">
            <input type="text" id="courseDesc" placeholder="Description">
          <button class="btn" onclick="addCourse()">+ Add</button>
        </div>
      </div>

      <!-- Batches -->
      <div class="admin-section">
        <h2>📦 Batches</h2>
        <select id="batchCourseSelect" class="form-row" style="display:block; margin-bottom:12px;" onchange="loadBatches()">
          <option value="">-- Select Course --</option>
        </select>
        <div id="batchList"></div>
        <div class="form-row">
          <input type="text" id="batchTitle" placeholder="Batch title">
          <input type="text" id="batchThumb" placeholder="Thumbnail URL">
          <input type="text" id="batchDesc" placeholder="Description">
          <button class="btn" onclick="addBatch()">+ Add Batch</button>
        </div>
      </div>

      <!-- Lectures -->
      <div class="admin-section">
        <h2>🎥 Lectures</h2>
        <select id="lecBatchSelect" class="form-row" style="display:block; margin-bottom:12px;" onchange="loadLectures()">
          <option value="">-- Select Batch --</option>
        </select>
        <div id="lectureList"></div>
        <div class="form-row">
          <input type="text" id="lecTitle" placeholder="Title *">
          <input type="text" id="lecThumb" placeholder="Thumbnail URL">
          <input type="text" id="lecVideo" placeholder="Video URL *">
          <input type="text" id="lecNotes" placeholder="Notes URL">
          <input type="text" id="lecDPP" placeholder="DPP URL">
          <input type="number" id="lecOrder" placeholder="Order">
          <button class="btn" onclick="addLecture()">+ Add</button>
        </div>
        <!-- Edit Lecture Form -->
        <div id="editForm" class="hidden" style="margin-top:20px; padding:15px; background:#fff3cd; border-radius:8px;">
          <h3>Edit Lecture</h3>
          <input type="hidden" id="editId">
          <input type="text" id="editTitle" placeholder="Title">
          <input type="text" id="editThumb" placeholder="Thumbnail URL">
          <input type="text" id="editVideo" placeholder="Video URL">
          <input type="text" id="editNotes" placeholder="Notes URL">
          <input type="text" id="editDPP" placeholder="DPP URL">
          <input type="number" id="editOrder" placeholder="Order">
          <button class="btn" onclick="updateLecture()">Update</button>
          <button class="btn btn-outline" onclick="hideEdit()">Cancel</button>
        </div>
      </div>
    </div>
  </div>
  <script src="admin.js"></script>
</body>
</html>
